name: Deploy ARC Runner Scale Set

on:
  workflow_call:
    inputs:
      image_full_tag:
        description: "Tag completo dell'immagine runner (ghcr.io/org/image:tag)"
        required: true
        type: string
      arc_runner_set_name:
        required: false
        type: string
        default: "arc-runner-set"
      arc_namespace:
        required: false
        type: string
        default: "arc-runners"
      arc_system_namespace:
        required: false
        type: string
        default: "arc-system"
      github_config_url:
        required: true
        type: string
      values_yaml_path:
        required: false
        type: string
        default: "./arc-runner-image/values.yaml"
      use_pat:
        type: boolean
        required: false
        default: false
      use_github_app:
        type: boolean
        required: false
        default: true

    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AKS_RESOURCE_GROUP:
        required: true
      AKS_CLUSTER_NAME:
        required: true
      ARC_GITHUB_TOKEN:
        required: false
      ARC_GITHUB_APP_ID:
        required: false
      ARC_GITHUB_APP_INSTALLATION_ID:
        required: false
      ARC_GITHUB_APP_PRIVATE_KEY:
        required: false

jobs:
  deploy-arc-runner:
    name: Deploy ARC Runner su AKS
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ---------------------------------------------------------------- #
      # 1. Checkout
      # ---------------------------------------------------------------- #
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------- #
      # 2. Azure Login (OIDC)
      # ---------------------------------------------------------------- #
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------------------------------------------- #
      # 3. Kubeconfig AKS
      # ---------------------------------------------------------------- #
      - name: Imposta kubeconfig per AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      # ---------------------------------------------------------------- #
      # 4. Namespace
      # ---------------------------------------------------------------- #
      - name: Crea namespace ARC (se assenti)
        run: |
          kubectl create namespace ${{ inputs.arc_system_namespace }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace ${{ inputs.arc_namespace }} --dry-run=client -o yaml | kubectl apply -f -

      # ---------------------------------------------------------------- #
      # 5. Secret GitHub (PAT)
      # ---------------------------------------------------------------- #
      - name: Crea secret Kubernetes (PAT)
        if: ${{ inputs.use_pat }}
        run: |
          kubectl create secret generic arc-github-secret \
            --namespace ${{ inputs.arc_namespace }} \
            --from-literal=github_token='${{ secrets.ARC_GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      # ---------------------------------------------------------------- #
      # 5b. Secret GitHub (GitHub App)
      # ---------------------------------------------------------------- #
      - name: Crea secret Kubernetes (GitHub App)
        if: ${{ inputs.use_github_app }}
        env:
          PRIVATE_KEY: ${{ secrets.ARC_GITHUB_APP_PRIVATE_KEY }}
        run: |
          printf '%s' "$PRIVATE_KEY" > /tmp/arc-app-key.pem

          kubectl delete secret arc-github-secret \
            --namespace ${{ inputs.arc_namespace }} \
            --ignore-not-found=true

          kubectl create secret generic arc-github-secret \
            --namespace ${{ inputs.arc_namespace }} \
            --from-literal=github_app_id='${{ secrets.ARC_GITHUB_APP_ID }}' \
            --from-literal=github_app_installation_id='${{ secrets.ARC_GITHUB_APP_INSTALLATION_ID }}' \
            --from-file=github_app_private_key=/tmp/arc-app-key.pem

          rm -f /tmp/arc-app-key.pem

      # ---------------------------------------------------------------- #
      # 6. Installa/aggiorna il controller ARC
      #    Deve girare PRIMA del runner set, altrimenti il chart
      #    non trova il deployment del controller e fallisce il binding.
      # ---------------------------------------------------------------- #
      - name: Helm upgrade arc-controller
        run: |
          helm upgrade arc \
            --install \
            --namespace ${{ inputs.arc_system_namespace }} \
            --create-namespace \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-controller \
            --wait \
            --timeout 5m

      # ---------------------------------------------------------------- #
      # 7. Installa/aggiorna il runner scale set
      # ---------------------------------------------------------------- #
      - name: Helm upgrade arc-runner-set
        run: |
          helm upgrade ${{ inputs.arc_runner_set_name }} \
            --install \
            --namespace ${{ inputs.arc_namespace }} \
            --create-namespace \
            -f ${{ inputs.values_yaml_path }} \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
            --wait \
            --timeout 5m

      # ---------------------------------------------------------------- #
      # 8. Restart controller per recepire eventuali nuovi secret/config
      # ---------------------------------------------------------------- #
      - name: Restart ARC controller
        run: |
          kubectl rollout restart deployment arc-gha-rs-controller \
            -n ${{ inputs.arc_system_namespace }}

          kubectl rollout status deployment arc-gha-rs-controller \
            -n ${{ inputs.arc_system_namespace }} \
            --timeout=120s

      # ---------------------------------------------------------------- #
      # 9. Verifica pod
      # ---------------------------------------------------------------- #
      - name: Verifica pod runner
        run: |
          echo "=== Pod in ${{ inputs.arc_namespace }} ==="
          kubectl get pods -n ${{ inputs.arc_namespace }}

          echo "=== Pod in ${{ inputs.arc_system_namespace }} ==="
          kubectl get pods -n ${{ inputs.arc_system_namespace }}

          kubectl wait pod \
            --for=condition=Ready \
            --selector=app.kubernetes.io/name=gha-rs-set \
            --namespace ${{ inputs.arc_system_namespace }} \
            --timeout=180s || true

      # ---------------------------------------------------------------- #
      # 10. Summary
      # ---------------------------------------------------------------- #
      - name: Summary deploy
        if: always()
        run: |
          echo "### Deploy ARC completato" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valore |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Immagine | \`${{ inputs.image_full_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner Set | \`${{ inputs.arc_runner_set_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${{ inputs.arc_namespace }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${{ secrets.AKS_CLUSTER_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Config URL | ${{ inputs.github_config_url }} |" >> "$GITHUB_STEP_SUMMARY"
